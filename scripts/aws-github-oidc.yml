AWSTemplateFormatVersion: '2010-09-09'
Description: >
  GitHub Actions OIDC Identity Provider + IAM Role for
  vestgoteUptive/up-design-flow-automation deployments.
  Deploy this stack once in your AWS account, then copy the
  RoleArn output into GitHub Secrets as AWS_OIDC_ROLE_ARN.

Parameters:
  GitHubOrg:
    Type: String
    Default: vestgoteUptive
    Description: GitHub organisation or username

  GitHubRepo:
    Type: String
    Default: up-design-flow-automation
    Description: GitHub repository name

  OIDCProviderArn:
    Type: String
    Default: ''
    Description: >
      Leave blank to create a new OIDC provider. If you already have
      token.actions.githubusercontent.com registered in this account,
      paste its ARN here to reuse it.

Conditions:
  CreateOIDCProvider: !Equals [!Ref OIDCProviderArn, '']

Resources:

  # ── OIDC Identity Provider ──────────────────────────────────────────────────
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        # GitHub's current OIDC thumbprint (valid as of 2024)
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  # ── IAM Role ────────────────────────────────────────────────────────────────
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub GitHubActions-${GitHubRepo}-Deploy
      Description: Assumed by GitHub Actions via OIDC for CDK deployments
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub:
                  !Sub repo:${GitHubOrg}/${GitHubRepo}:*
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      ManagedPolicyArns:
        # AdministratorAccess is required for CDK to manage IAM roles,
        # CloudFormation stacks, and all the services in this project.
        # Scope this down after your first successful deploy if desired.
        - arn:aws:iam::aws:policy/AdministratorAccess

Outputs:
  RoleArn:
    Description: >
      Add this value to GitHub Secrets as AWS_OIDC_ROLE_ARN
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-RoleArn

  OIDCProviderArn:
    Description: OIDC provider ARN (reuse this if you deploy another repo)
    Value: !If
      - CreateOIDCProvider
      - !Ref GitHubOIDCProvider
      - !Ref OIDCProviderArn
